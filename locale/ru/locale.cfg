[technology-description]
aop-arc-furnace=Массивная печь, способная на быстрое и эффективное литье
aop-atomic-enricher=Модернизированная версия [entity=centrifuge], пригодная для более сложных ядерных процессов
aop-greenhouse=Искусственное поле для более компактного, дешевого и быстрого выращивания деревьев и сельскохозяйственных культур
aop-hydraulic-plant=Машина, способная эффективно работать с гидравлическими процессами
aop-petrochemical-facility=Улучшенная версия [entity=oil-refinery], способная запускать различные нефтехимические реакции
aop-quantum-machinery=Финальные рубежи исследований, крафта и передачи эффектов
aop-lumber-mill=Машина с низким потреблением энергии, которая делает обработку  [item=wood] быстрее
aop-agriculture-productivity=Увеличивает урожайность культур в [entity=aop-greenhouse]
aop-advanced-recycling=Достижения в сфере модулей открыли возможность более эффективной переработки.
aop-automation=Продвинутый сборочный автомат, способный работать с жидкостями. Обладает увеличенной скоростью работы, бонусом продуктивности и большим количеством слотов под модули, чем предшественник.
aop-core-mining=Финальный этап добычи, позволяющий извлекать буквально бесконечные ресурсы на больших планетах с устойчивыми поверхностями
aop-core-mining-productivity=Увеличение добычи [entity=aop-core-miner]
aop-deep-mineral-refining-productivity=Используйте лучшие методы переработки глубоких пород, для обеспечения еще большего количества руды
aop-armory=Новое слово в технологиях вооружения, позволяющее производить амуницию в невиданных масштабах
aop-synthesis=Используйте  [item=aop-metallic-traces] полученные при фильтрации вод [planet=aquilo] [tile=ammoniacal-ocean], чтобы синтезировать руды в условиях замерзшего мира 
aop-biomass-reactor=Получите доступ к альтернативному производству [item=nutrients] и новому источнику энергии, базирующемуся на переработке биомассы
aop-smaller-beacons=Небольшой и компактный [entity=beacon]. Может вмещать только один модуль, но с более высокой эффективностью распределения. Отключается, когда два маяка находятся рядом друг с другом.
aop-bitumen-processing=Процесс обработки [fluid=heavy-oil] и [item=stone] для создания плотного изоляционного вещества.
aop-petrochemical-science-pack=Позволяет проводить продвинутые нефтехимические исследования
aop-thermal-science-pack=Позволяет использовать продвинутые термические приборы
aop-fission-science-pack=Позволяет исследовать ядерные процессы
aop-forestry-science-pack=Позволяет использовать более продвинутые методы ведения лесного хозяйства
aop-quantistic-science-pack=Разрешает доступ к секретам квантовых частиц
aop-radiation-cladding=Тяжелая обшивка, которая защищает от сильной радиации.
aop-uranium-233-breeding=Позволяет множить нестабильный изотоп [item=uranium-ore]
aop-quicklime-explosives=Позволяет создавать [item=explosives] из [item=aop-quicklime]
aop-biocircuits=Используйте бактерии и [item=bioflux] для создания полностью биологической электроники
aop-asphalt=Мощение дорог [fluid=aop-bitumen], позволяет ускорить движение автомобиля.
aop-tritium-synthesis=Синтезируйте [fluid=aop-tritium] с использованием контролируемого ядерного синтеза.
aop-water-rectification=Разделите [fluid=aop-deuterium] и, реже, [fluid=aop-tritium] от тяжелой воды, обнаруженной в источниках [fluid=water].

