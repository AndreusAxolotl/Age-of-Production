aop-charcoal=Burn [item=wood] into [item=carbon].
aop-wood-rotting=The process to rot [item=wood] into [item=spoilage]. Uses a small amount of [item=spoilage]. as a catalyst.
aop-uranium-sifting=Sift through [item=stone] to find uranium.
aop-solid-fuel-melting=Melt [item=solid-fuel] back into [fluid=crude-oil].
aop-carbon-liquefaction=An alternative technique to coal liquefaction.
