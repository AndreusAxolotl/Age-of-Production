[entity-description]
aop-arc-furnace=Gigantyczny piec, który może produkować ogromne ilości materiałów, zużywając mnóstwo energii i emitując znacznie więcej zanieczyszczeń niż zwykle.
aop-atomic-enricher=Wysoce radioaktywna maszyna, która umożliwia procesy wirowania o wysokiej wydajności.
aop-hydraulic-plant=Maszyna oparta na hydraulice, umożliwiająca przygotowywanie receptur płynów o dużej wydajności.
aop-petrochemical-facility=Silnie zanieczyszczająca maszyna specjalizująca się w petrochemii.
aop-quantum-computer=Ostatnia granica badań. Wykorzystuje mechanikę kwantową, aby zużywać jedną dziesiątą każdego pakietu naukowego. Zbyt niebezpieczny, by używać go poza przestrzenią kosmiczną.
aop-core-miner=Ostatnia granica w górnictwie. Kop głęboko pod powierzchnię planet, aby zdobyć niezliczone zasoby. Można go umieścić tylko na planetach o powierzchni wystarczająco twardej i gęstej, aby wytrzymać głębokie operacje wydobywcze.
aop-biomass-reactor=Generator elektryczny zdolny do wytwarzania energii z materii biologicznej.
aop-transmitter=W małych opakowaniach kryją się wielkie zalety.

