[mod-name]
Age-of-Production=Эра продуктивности

[mod-description]
Age-of-Production=Добавляет новые постройки для Factorio Space Age для большего разнообразия и продуктивности!

[mod-setting-name]
aop-merge-atomic-enricher=Объединить атомный обогатитель с аналогичной постройкой в моде "Ядерная наука".
aop-prevent-loops=Предотвращает зацикливание производственных цепочек.


[mod-setting-description]
aop-merge-atomic-enricher=Удалить атомный обогатитель и оставить аналогичную постройку из мода "Ядерная наука".
aop-prevent-loops=Эта настройка предотвращает бесконечное зацикливание производственных цепочек синтеза кальцита, камня, плавки льда и заморозки воды. Если хотите больше зацикленных цепочек - выключите настройку. Прошу сообщать обо всех зацикленных цепочках производства, особенно не связанных с дополнительно используемыми модами.

