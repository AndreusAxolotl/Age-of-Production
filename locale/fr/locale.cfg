Age-of-Production=Age of Production

[mod-description]
Age-of-Production=Rajoute plein de nouvelles machines pour Space Age, pour faire des chaînes de production plus grosses et variées!

[mod-setting-name]
aop-merge-atomic-enricher=Fusionner l'Enrichisseur Atomique de AoP à la Forge Atomique de Nuclear Science.
aop-prevent-loops=Supprimer les chaînes de production bouclées.


[mod-setting-description]
aop-merge-atomic-enricher=Supprimer l'Enrichisseur Atomique et garde la Forge Atomique du mod Nuclear Science.
aop-prevent-loops=Cette option empêche les recettes "synthèse de calcite" et "synthèse de pierre", et "fonte de glace" et "congélation d'eau" de créer des boucles infinies. À désactiver si vous voulez ces boucles. Veuillez me prévenir si vous trouvez d'autres boucles, en particulier sans l'usage d'autres mods.

