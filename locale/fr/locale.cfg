aop-water-rectification=Sépare les isotopes d'hydrogène rares contenus dans l'[fluid=water] en utilisant la chaleur de [fluid=fluoroketone-hot].
aop-ammoniacal-solution-sifting=Extrait des [item=aop-metallic-traces] de [fluid=ammoniacal-solution].
aop-copper-ore-from-metallic-traces=Synthétise du [item=copper-ore] à partir de [item=aop-metallic-traces], en utilisant un autre [item=copper-ore] comme catalyseur.
aop-iron-ore-from-metallic-traces=Synthétise du [item=iron-ore] à partir de [item=aop-metallic-traces], en utilisant un autre [item=iron-ore] comme catalyseur.
