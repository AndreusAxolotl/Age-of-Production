[technology-description]
aop-arc-furnace=Massive furnace capable of fast and efficient smelting.
aop-atomic-enricher=Upgraded [entity=centrifuge] capable of more advanced nuclear processes.
aop-greenhouse=Artificial field that allows more compact, cheaper and faster farming of trees and crops.
aop-hydraulic-plant=Machine capable of running hydraulic processes efficiently.
aop-petrochemical-facility=Upgraded [entity=oil refinery] that can ran various petrochemical processes.
aop-quantum-machinery=The final frontiers of research, crafting and effect transmission.
aop-lumber-mill=Low power machine that can make [item=wood] processing faster.
aop-agriculture-productivity=Increased plant yield in [entity=aop-greenhouse]s.
aop-advanced-recycling=Thanks to new module technology, new recycling techniques can be achieved.
aop-automation=Assembling machines capable of processing fluid ingredients, with additional speed, productivity and module slots. 
aop-core-mining=The final frontier of mining, allowing for basically endless resources to be extracted on large planets with stable surfaces.
aop-core-mining-productivity=Increased yield from [entity=aop-core-miner]s.
aop-deep-mineral-refining-productivity=Use better techniques for deep mineral processing to allow the extraction of more ores.
aop-armory=New military technologies allow us to produce ammunition at unseen rates.
aop-synthesis=Use the [item=aop-metallic-traces] obtained from sifting [planet=aquilo]'s [tile=ammoniacal-ocean] to synthesize ores on the barren frozen world.
aop-biomass-reactor=Gain access to a more efficient alternative to [item=nutrients] and an energy source based on biomatter smelting.
aop-smaller-beacons=Compact and space efficient [entity=beacon]s. Can only fit one module, but with a higher distribution efficiency that only kicks off when two are placed near each other.
aop-bitumen-processing=Process [fluid=heavy-oil] and [item=stone] to craft a dense insulating substance.
aop-petrochemical-science-pack=Allows for more advanced petrochemical research.
aop-thermal-science-pack=Allows for more advanced thermal applications.
aop-fission-science-pack=Allows the research of nuclear processes.
aop-forestry-science-pack=Allows for more advanced forestry applications
aop-quantistic-science-pack=Allows access to the secrets of quantum particles.
aop-radiation-cladding=Heavy plating that protects from heavy radiation.
aop-uranium-233-breeding=Allows for the breeding of a more unstable isotope of [item=uranium-ore].
aop-quicklime-explosives=Allows [item=explosives] to be crafted from [item=aop-quicklime].
aop-biocircuits=Use bacteria and [item=bioflux] to craft entirely biological electronics.
aop-asphalt=[fluid=aop-bitumen] based pavimentation that allows for faster vehicle movement.
aop-tritium-synthesis=Synthesize [fluid=aop-tritium] using controlled nuclear fusion.
aop-water-rectification=Separate [fluid=aop-deuterium] and, more rarely, [fluid=aop-tritium] from heavy water found in [fluid=water] sources.

