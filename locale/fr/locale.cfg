[entity-description]
aop-arc-furnace=Un four gigantesque capable de produire des matériaux en grande quantité, en consommant une quantité considérable d'énergie et en émettant bien plus de pollution que la normale.
aop-atomic-enricher=Une machine hautement radioactive capable de réaliser des procédés par centrifugation à haute efficacité.
aop-greenhouse=Installation botanique compacte pour la culture de plantes.
aop-hydraulic-plant=Une machine hydraulique permettant de réaliser des recettes fluidiques à haute capacité.
aop-lumber-mill=Un bâtiment économe en énergie capable de produire en masse des produits transformés en bois.
aop-petrochemical-facility=Une usine très polluante, spécialisée en pétrochimie.
aop-quantum-assembler=Une machine d'assemblage extrêmement puissante, améliorée par l'informatique quantique. Elle est capable de fabriquer des packs de science en quantités auparavant impossible.
aop-quantum-computer=La frontière ultime en matière de recherches. Ce laboratoire utilise la mécanique quantique pour utiliser 10 fois moins de packs de science, cependant il est trop dangereux pour être utilisé ailleurs que dans l'espace.
aop-quantum-stabilizer=Une version améliorée très puissante du [entity=beacon]. Améliore les machines via des manipulations quantiques.
aop-salvager=Ce puissant [entity=recycler] amélioré recycle les produits en versions de meilleure qualité bien plus facilement.
aop-advanced-assembling-machine=Une machine d'assemblage plus grande, avec des effets de modules intégrés.
aop-core-miner=La frontière ultime en manière d'extraction minière. Cette foreuse creuse profondément sous la surface de la planète pour extraire d'innombrables ressources. Ne peut être construite que sur les planètes avec une surface solide et assez dense pour supporter les opérations de minage profond.
aop-armory=Permet la fabrication de munitions à haute fréquence.
aop-synthesizer=Grâce à des procédés chimiques avancés, cette machine est capable de synthétiser des minéraux à partir de ressources basiques.
aop-biomass-reactor=Un générateur électrique capable de produire de l'énergie à partir de matière organique.
aop-transmitter=Les bonnes choses viennent en petits paquets.

