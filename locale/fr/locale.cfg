aop-core-mining=Fore en profondeur sous la surface des planètes pour obtenir des ressources pures.
aop-mineral-slurry=Transforme la [item=aop-deep-mineral] en boue minérale pour faciliter l'extraction de minerai.
aop-mineral-slurry-processing=Nettoie les impuretés contenues dans la boue pour créer des [item=aop-refined-mineral].
