aop-charcoal=Brûle du [item=wood] en [item=carbon].
aop-wood-rotting=Un processus de décomposition du [item=wood] en [item=spoilage]. Nécessite une petite quantité de [item=spoilage] en gage de catalyseur.
aop-uranium-sifting=Passe de la [item=stone] au crible en séparer de l'uranium.
