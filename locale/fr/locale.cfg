[technology-description]
aop-arc-furnace=Un four massif, capable de faire fondre les métaux rapidement et efficacement.
aop-atomic-enricher=Une [entity=centrifuge] améliorée capable de réaliser des processus nucléaires avancés.
aop-greenhouse=Un champ artificiel qui permet de cultiver des plantes de manière plus compacte, économe et rapide.
aop-hydraulic-plant=Une machine capable de réaliser des opérations fluidiques plus efficaces.
aop-quantum-machinery=Les limites ultimes en matière de recherche, de fabrication et de diffusions de modules.
aop-lumber-mill=Une machine de basse puissance, capable de transformer le [item=wood] à la chaîne.
aop-agriculture-productivity=Augmente le rendement des cultures en [entity=aop-greenhouse].
aop-advanced-recycling=Grâce aux nouvelles technologies des modules, de nouveaux procédés de recyclages peuvent être réalisés.
aop-automation=Des machines d'assemblage capable d'opérer avec des ingrédients fluides, avec une meilleure vitesse, un boost de productivité et des emplacements pour modules additionnels.
aop-core-mining=La limite ultime en matière d'extraction minière. Permet essentiellement l'extraction en continu de ressources infinies sur les planètes assez grosses qui possèdent une surface stable.
aop-core-mining-productivity=Augmente la productivité des [entity=aop-core-miner].
aop-deep-mineral-refining-productivity=L'utilisation de meilleures méthodes de traitement des roches des profondeurs permet d'en extraire plus de minerai.
aop-armory=De nouvelles technologies militaires nous permettent de produire des munitions à cadence effrénée.
aop-synthesis=En utilisant les [item=aop-metallic-traces] obtenues par décantation de l'eau des [tile=ammoniacal-ocean] d'[planet=aquilo], il est possible de synthétiser des minerais sur ce monde gelé.
aop-biomass-reactor=Débloque une alternative plus efficace aux [item=nutrients] qui peut aussi servir de source d'énergie par combustion.
aop-smaller-beacons=Un [entity=beacon] compacte et efficace. Ne peut supporter qu'un seul module, mais possède une meilleure efficacité de diffusion d'effets qui ne réduit que lorsque l'on en place plus de deux à proximité les uns des autres.
aop-bitumen-processing=Transforme de l'[fluid=heavy-oil] et de la [item=stone] pour fabriquer un isolant dense.
aop-petrochemical-science-pack=Permet la découverte d'applications pétrochimiques avancées.
aop-thermal-science-pack=Permet la découverte d'applications thermiques avancées.
aop-fission-science-pack=Permet la découverte d'applications nucléaires.
aop-forestry-science-pack=Permet la découverte d'applications arboricoles avancées
aop-quantistic-science-pack=Permet d'étudier les secrets les particules quantiques.
aop-radiation-cladding=Une plaque renforcée qui bloque les rayonnements ionisants.
aop-uranium-233-breeding=Permet la génération d'un isotope d'[item=uranium-ore] plus instable.
aop-quicklime-explosives=Permet de fabriquer des [item=explosives] à partir de [item=aop-quicklime].
aop-biocircuits=En utilisant des bactéries et du [item=bioflux], il est possible de fabriquer des circuits électroniques entièrement biologiques.
aop-asphalt=Un revêtement en [fluid=aop-bitumen] qui facilite les déplacements en véhicules.
aop-tritium-synthesis=Synthétise du [fluid=aop-tritium] par fusion nucléaire contrôlée.
aop-water-rectification=Permet d'extraire le [fluid=aop-deuterium] et, rarement, le [fluid=aop-tritium] contenu dans l'eau lourde, puisée dans les sources d'[fluid=water].

