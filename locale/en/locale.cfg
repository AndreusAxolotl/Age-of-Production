[mod-setting-description]
aop-merge-atomic-enricher=Remove the Atomic Enrticher and just keep Nuclear Science's Atom Forge.
aop-prevent-loops=This setting prevents calcite and stone synthesis from causing infinite loops. Turn off if you do want the loops. Inform me incase more loops are found, specifically without use of any additional quality mods.

